services:
  - type: web
    name: separation-pmo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: "gunicorn 'web.app:create_app()' --bind 0.0.0.0:$PORT"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: separation-pmo-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
